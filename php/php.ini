; ─── PHP 7.4 Custom Configuration ───────────────────────────────────────────
; Disesuaikan agar mirip dengan environment Hostinger

[PHP]
; Batas memory & eksekusi
memory_limit          = 256M
max_execution_time    = 120
max_input_time        = 120
max_input_vars        = 3000

; Upload file
upload_max_filesize   = 64M
post_max_size         = 64M

; Error reporting (gunakan development untuk lokal, production untuk server)
display_errors        = On
display_startup_errors= On
error_reporting       = E_ALL
log_errors            = On
error_log             = /var/log/apache2/php_errors.log

; Timezone
date.timezone         = Asia/Jakarta

; Session
session.gc_maxlifetime = 7200
session.cookie_httponly = 1

; Output buffering
output_buffering      = 4096

; Short tags (aktifkan jika website pakai <?  ?>)
short_open_tag        = On
