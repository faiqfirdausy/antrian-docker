<style type="text/css">
  @import url('https://fonts.googleapis.com/css?family=Oswald');
*
{
  margin: 0;
  padding: 0;
  border: 0;
  box-sizing: border-box
}

body
{
  background-color: #dadde6;
  font-family: arial
}

.fl-left{float: left}

.container
{
  width: 90%;
  margin: auto;
 }

h1
{
  text-transform: uppercase;
  font-weight: 900;
  border-left: 10px solid #fec500;
  padding-left: 10px;
  margin-bottom: 30px
}

.row
{
  overflow: hidden;
  position: absolute;
  top: 30%;
  left: 35%;
}

.card
{
  display: table-row;
  width: 100%;
  background-color: #fff;
  color: #989898;
  margin-bottom: 10px;
  font-family: 'Oswald', sans-serif;
  text-transform: uppercase;
  border-radius: 4px;
  position: relative
}

.card + .card{margin-left: 2%}

.date
{
  display: table-cell;
  width: 25%;
  position: relative;
  text-align: center;
  border-right: 2px dashed #dadde6
}

.date:before,
.date:after
{
  content: "";
  display: block;
  width: 30px;
  height: 30px;
  background-color: #DADDE6;
  position: absolute;
  top: -15px ;
  right: -15px;
  z-index: 1;
  border-radius: 50%
}

.date:after
{
  top: auto;
  bottom: -15px
}

.date time
{
  display: block;
  position: absolute;
  top: 50%;
  left: 50%;
  -webkit-transform: translate(-50%, -50%);
  -ms-transform: translate(-50%, -50%);
  transform: translate(-50%, -50%)
}

.date time span{display: block}

.date time span:first-child
{
  color: #2b2b2b;
  font-weight: 600;
  font-size: 250%
}

.date time span:last-child
{
  text-transform: uppercase;
  font-weight: 600;
  margin-top: -10px
}

.card-cont
{
  display: table-cell;
  width: 75%;
  font-size: 85%;
  padding: 10px 10px 30px 50px
}

.card-cont h3
{
  color: #3C3C3C;
  font-size: 130%
}

.row:last-child .card:last-of-type .card-cont h3
{
  text-decoration: line-through
}

.card-cont > div
{
  display: table-row
}

.card-cont .even-date i,
.card-cont .even-info i,
.card-cont .even-date time,
.card-cont .even-info p
{
  display: table-cell
}

.card-cont .even-date i,
.card-cont .even-info i
{
  padding: 5% 5% 0 0
}

.card-cont .even-info p
{
  padding: 30px 50px 0 0
}

.card-cont .even-date time span
{
  display: block
}

.card-cont a
{
  display: block;
  text-decoration: none;
  width: 80px;
  height: 30px;
  background-color: #D8DDE0;
  color: #fff;
  text-align: center;
  line-height: 30px;
  border-radius: 2px;
  position: absolute;
  right: 10px;
  bottom: 10px
}

.row:last-child .card:first-child .card-cont a
{
  background-color: #037FDD
}

.row:last-child .card:last-child .card-cont a
{
  background-color: #F8504C
}
</style>

<!DOCTYPE html>
<html>
<body style="background-color: #dadde6;font-family: arial;">
  <section class="container" style="width: 90%;margin: auto;">
    <div class="row" style="overflow: hidden;position: absolute;top: 30%;left: 35%;">
      <article class="card fl-left" style="float: left;display: table-row;width: 100%;background-color: #fff;color: #989898;margin-bottom: 10px;font-family: 'Oswald', sans-serif;text-transform: uppercase;border-radius: 4px;position: relative;">
        </article></div></section><section class="date" style="display: table-cell;width: 25%;position: relative;text-align: center;border-right: 2px dashed #dadde6;">
          <time datetime="23th feb" style="display: block;position: absolute;top: 50%;left: 50%;-webkit-transform: translate(-50%, -50%);-ms-transform: translate(-50%, -50%);transform: translate(-50%, -50%);">
            <span style="display: block;color: #2b2b2b;font-weight: 600;font-size: 250%;">23</span><span style="display: block;text-transform: uppercase;font-weight: 600;margin-top: -10px;">feb</span>
          </time>
        </section>
        <section class="card-cont" style="display: table-cell;width: 75%;font-size: 85%;padding: 10px 10px 30px 50px;">
          <small>dj khaled</small>
          <h3 style="color: #3C3C3C;font-size: 130%;">live in sydney</h3>
          <div class="even-date" style="display: table-row;">
           <i class="fa fa-calendar" style="display: table-cell;padding: 5% 5% 0 0;"></i>
           <time style="display: table-cell;">
             <span style="display: block;">wednesday 28 december 2014</span>
             <span style="display: block;">08:55pm to 12:00 am</span>
           </time>
          </div>
          <div class="even-info" style="display: table-row;">
            <i class="fa fa-map-marker" style="display: table-cell;padding: 5% 5% 0 0;"></i>
            <p style="display: table-cell;padding: 30px 50px 0 0;">
              nexen square for people australia, sydney
            </p>
          </div>
        </section>
</body>
</html>
